<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style><![CDATA[
      .bg { fill: #050a14; }
      .orb-slow { animation: drift1 16s ease-in-out infinite; transform-origin: center; }
      .orb-med  { animation: drift2 11s ease-in-out infinite; transform-origin: center; }
      .orb-fast { animation: drift3 8s  ease-in-out infinite; transform-origin: center; }

      .ring1 { animation: spin3d 12s linear infinite; transform-origin: 400px 150px; }
      .ring2 { animation: spin3dRev 16s linear infinite; transform-origin: 400px 150px; }
      .ring3 { animation: spin3d 20s linear infinite; transform-origin: 400px 150px; }

      .hex { animation: spinHex 18s linear infinite; transform-origin: 400px 150px; }
      .hex-inner { animation: spinHexRev 10s linear infinite; transform-origin: 400px 150px; }

      .particle { animation: float 5s ease-in-out infinite; }
      .p1 { animation-delay: 0s; }
      .p2 { animation-delay: -0.8s; }
      .p3 { animation-delay: -1.6s; }
      .p4 { animation-delay: -2.4s; }
      .p5 { animation-delay: -3.2s; }
      .p6 { animation-delay: -4.0s; }

      .orbit1 { animation: orbit1 8s linear infinite; transform-origin: 400px 150px; }
      .orbit2 { animation: orbit2 12s linear infinite; transform-origin: 400px 150px; }
      .orbit3 { animation: orbit3 10s linear infinite; transform-origin: 400px 150px; }
      .orbit4 { animation: orbit4 14s linear infinite; transform-origin: 400px 150px; }

      .blink1 { animation: blink 2.5s ease-in-out infinite; }
      .blink2 { animation: blink 3.2s ease-in-out infinite; animation-delay: -1s; }
      .blink3 { animation: blink 2.8s ease-in-out infinite; animation-delay: -2s; }

      .scan { animation: scan 4s ease-in-out infinite; }
      .pulse { animation: pulse 2.5s ease-in-out infinite; transform-origin: 400px 150px; }

      .title {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 300;
        letter-spacing: 6px;
        fill: #b8e8ff;
        filter: url(#glow);
      }
      .subtitle {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-weight: 400;
        letter-spacing: 3px;
        fill: #00ff88;
        filter: url(#glow2);
      }
      .micro {
        font-family: 'Courier New', monospace;
        font-size: 9px;
        letter-spacing: 2px;
        fill: #00b8ff;
        opacity: 0.7;
      }
      .title-anim { animation: titleFade 5s ease-in-out infinite; }
      .sub-anim   { animation: subFade 5s ease-in-out infinite; animation-delay: -2.5s; }

      @keyframes drift1 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(40px,-30px) scale(1.15); }
      }
      @keyframes drift2 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(-50px,35px) scale(1.2); }
      }
      @keyframes drift3 {
        0%,100% { transform: translate(0,0) scale(1); }
        50%     { transform: translate(30px,40px) scale(0.85); }
      }
      @keyframes spin3d {
        0%   { transform: rotate(0deg)   scaleX(1); }
        25%  { transform: rotate(90deg)  scaleX(0.25); }
        50%  { transform: rotate(180deg) scaleX(1); }
        75%  { transform: rotate(270deg) scaleX(0.25); }
        100% { transform: rotate(360deg) scaleX(1); }
      }
      @keyframes spin3dRev {
        0%   { transform: rotate(360deg) scaleX(1); }
        25%  { transform: rotate(270deg) scaleX(0.35); }
        50%  { transform: rotate(180deg) scaleX(1); }
        75%  { transform: rotate(90deg)  scaleX(0.35); }
        100% { transform: rotate(0deg)   scaleX(1); }
      }
      @keyframes spinHex {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes spinHexRev {
        from { transform: rotate(360deg); }
        to   { transform: rotate(0deg); }
      }
      @keyframes float {
        0%,100% { transform: translateY(0) translateX(0); opacity: 0.6; }
        50%     { transform: translateY(-20px) translateX(12px); opacity: 1; }
      }
      @keyframes orbit1 {
        from { transform: rotate(0deg) translateX(180px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
      }
      @keyframes orbit2 {
        from { transform: rotate(0deg) translateX(220px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(220px) rotate(-360deg); }
      }
      @keyframes orbit3 {
        from { transform: rotate(0deg) translateX(150px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
      }
      @keyframes orbit4 {
        from { transform: rotate(0deg) translateX(260px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(260px) rotate(-360deg); }
      }
      @keyframes blink {
        0%,100% { opacity: 0.3; }
        50%     { opacity: 1; }
      }
      @keyframes scan {
        0%   { transform: translateY(-150px); opacity: 0; }
        10%  { opacity: 0.7; }
        90%  { opacity: 0.7; }
        100% { transform: translateY(150px); opacity: 0; }
      }
      @keyframes pulse {
        0%,100% { transform: scale(1); opacity: 0.6; }
        50%     { transform: scale(1.1); opacity: 1; }
      }
      @keyframes titleFade {
        0%,100% { opacity: 0.9; }
        50%     { opacity: 1; }
      }
      @keyframes subFade {
        0%,100% { opacity: 0.75; }
        50%     { opacity: 1; }
      }
    ]]></style>

    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00b8ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#0066cc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00ff88" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00aa55" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff0040" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#aa0028" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0088aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0066ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g6" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff3366" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00b8ff"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff0040"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="medBlur"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect class="bg" width="800" height="300"/>

  <!-- Capa profunda: orbes difuminados (más movimiento) -->
  <g filter="url(#softBlur)">
    <circle class="orb-slow" cx="120" cy="80"  r="150" fill="url(#g1)"/>
    <circle class="orb-med"  cx="680" cy="220" r="170" fill="url(#g2)"/>
    <circle class="orb-fast" cx="720" cy="50"  r="120" fill="url(#g3)"/>
    <circle class="orb-slow" cx="80"  cy="250" r="130" fill="url(#g4)"/>
    <circle class="orb-med"  cx="400" cy="150" r="200" fill="url(#g5)"/>
    <circle class="orb-fast" cx="250" cy="200" r="100" fill="url(#g6)"/>
    <circle class="orb-slow" cx="550" cy="80"  r="110" fill="url(#g1)"/>
  </g>

  <!-- Capa media: anillos orbitales -->
  <g opacity="0.85">
    <ellipse class="ring1" cx="400" cy="150" rx="260" ry="70"
             fill="none" stroke="url(#ringGrad1)" stroke-width="1.2"
             stroke-dasharray="4 6"/>
    <ellipse class="ring2" cx="400" cy="150" rx="210" ry="55"
             fill="none" stroke="url(#ringGrad2)" stroke-width="1"
             stroke-dasharray="2 4"/>
    <ellipse class="ring3" cx="400" cy="150" rx="320" ry="90"
             fill="none" stroke="url(#ringGrad3)" stroke-width="0.8"
             stroke-dasharray="1 8"/>
  </g>

  <!-- Esferas orbitales -->
  <g filter="url(#strongGlow)">
    <circle class="orbit1" cx="400" cy="150" r="4" fill="#00e5ff"/>
    <circle class="orbit2" cx="400" cy="150" r="3" fill="#00ff88"/>
    <circle class="orbit3" cx="400" cy="150" r="5" fill="#ff0040"/>
    <circle class="orbit4" cx="400" cy="150" r="3.5" fill="#00b8ff"/>
    <circle class="orbit2" cx="400" cy="150" r="2.5" fill="#ff3366" style="animation-delay: -6s;"/>
    <circle class="orbit3" cx="400" cy="150" r="4" fill="#00e5ff" style="animation-delay: -5s;"/>
  </g>

  <!-- Hexágono central con rotación -->
  <g class="pulse">
    <g class="hex">
      <polygon points="400,95 447.6,122.5 447.6,177.5 400,205 352.4,177.5 352.4,122.5"
               fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.9"/>
    </g>
    <g class="hex-inner">
      <polygon points="400,115 430.3,132.5 430.3,167.5 400,185 369.7,167.5 369.7,132.5"
               fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.7"/>
    </g>
    <circle cx="400" cy="150" r="3" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- Partículas flotantes con efecto de parpadeo -->
  <g filter="url(#glow)">
    <circle class="particle p1 blink1" cx="100" cy="70"  r="2"   fill="#00e5ff"/>
    <circle class="particle p2 blink2" cx="700" cy="90"  r="1.8" fill="#00ff88"/>
    <circle class="particle p3 blink3" cx="180" cy="230" r="2.2" fill="#ff0040"/>
    <circle class="particle p4 blink1" cx="620" cy="250" r="1.9" fill="#00b8ff"/>
    <circle class="particle p5 blink2" cx="540" cy="50"  r="1.7" fill="#ff3366"/>
    <circle class="particle p6 blink3" cx="280" cy="40"  r="1.5" fill="#00e5ff"/>
    <circle class="particle p1 blink1" cx="750" cy="170" r="1.6" fill="#00ff88"/>
    <circle class="particle p3 blink2" cx="50"  cy="150" r="1.8" fill="#0066ff"/>
    <circle class="particle p2 blink3" cx="450" cy="30"  r="1.4" fill="#ff0040"/>
    <circle class="particle p4 blink1" cx="350" cy="270" r="1.7" fill="#00e5ff"/>
    <circle class="particle p5 blink2" cx="150" cy="180" r="1.5" fill="#00ff88"/>
    <circle class="particle p6 blink3" cx="650" cy="140" r="1.6" fill="#ff3366"/>
    <circle class="particle p1 blink1" cx="500" cy="260" r="1.8" fill="#00b8ff"/>
    <circle class="particle p2 blink2" cx="220" cy="120" r="1.4" fill="#0066ff"/>
    <circle class="particle p3 blink3" cx="580" cy="200" r="1.5" fill="#00e5ff"/>
    <circle class="particle p4 blink1" cx="320" cy="160" r="1.6" fill="#ff0040"/>
    <circle class="particle p5 blink2" cx="680" cy="60"  r="1.3" fill="#00ff88"/>
    <circle class="particle p6 blink3" cx="120" cy="260" r="1.7" fill="#00b8ff"/>
    <circle class="particle p1 blink1" cx="420" cy="280" r="1.5" fill="#ff3366"/>
    <circle class="particle p2 blink2" cx="760" cy="240" r="1.4" fill="#00e5ff"/>
  </g>

  <!-- Línea de escaneo -->
  <g class="scan" opacity="0.6">
    <line x1="0" y1="150" x2="800" y2="150" stroke="url(#ringGrad2)" stroke-width="0.5"/>
  </g>

  <!-- Textos -->
  <g class="title-anim">
    <text class="title" x="400" y="155" text-anchor="middle" font-size="22">
      DEVELOPER &amp; ENGINEER
    </text>
  </g>
  <g class="sub-anim">
    <text class="subtitle" x="400" y="180" text-anchor="middle" font-size="12">
      IN PROGRESS  ·  TECH EXPLORER
    </text>
  </g>

  <!-- Micro-textos decorativos en esquinas -->
  <text class="micro" x="20"  y="25">[ sys.init ]</text>
  <text class="micro" x="20"  y="285">v2.4.1 // online</text>
  <text class="micro" x="780" y="25"  text-anchor="end">&lt;/code&gt;</text>
  <text class="micro" x="780" y="285" text-anchor="end">render:60fps</text>

  <!-- Marcos sutiles -->
  <rect x="10" y="10" width="780" height="280" fill="none"
        stroke="#00e5ff" stroke-width="0.3" opacity="0.3"/>
  <rect x="15" y="15" width="770" height="270" fill="none"
        stroke="#00ff88" stroke-width="0.3" opacity="0.25"/>
</svg>
