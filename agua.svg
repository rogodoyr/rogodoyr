<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    @keyframes wave {
      0% { transform: translateX(0px) translateY(0px); }
      50% { transform: translateX(20px) translateY(-10px); }
      100% { transform: translateX(0px) translateY(0px); }
    }
    
    @keyframes drop {
      0% { transform: translateY(-20px); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(40px); opacity: 0; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    
    .wave-anim {
      animation: wave 4s ease-in-out infinite;
    }
    
    .drop-anim {
      animation: drop 2s ease-in infinite;
    }
    
    .drop-anim:nth-child(2) { animation-delay: 0.7s; }
    .drop-anim:nth-child(3) { animation-delay: 1.4s; }
    
    .pulse-anim {
      animation: pulse 3s ease-in-out infinite;
    }
  </style>
  
  <!-- Fondo -->
  <rect width="800" height="200" fill="#0a0a1a" rx="10" />
  
  <!-- Líneas decorativas de agua -->
  <path d="M0,120 Q100,100 200,120 Q300,140 400,120 Q500,100 600,120 Q700,140 800,120" 
        stroke="#0066ff" stroke-width="2" fill="none" class="wave-anim" opacity="0.3"/>
  
  <path d="M0,140 Q100,130 200,140 Q300,150 400,140 Q500,130 600,140 Q700,150 800,140" 
        stroke="#00ccff" stroke-width="1.5" fill="none" class="wave-anim" opacity="0.2"/>
  
  <!-- Gota principal -->
  <g transform="translate(100, 80)">
    <path d="M0,0 Q10,-20 0,-40 Q-10,-20 0,0Z" fill="#00ccff" class="drop-anim" />
    <path d="M0,0 Q10,-20 0,-40 Q-10,-20 0,0Z" fill="#00ccff" class="drop-anim" />
    <path d="M0,0 Q10,-20 0,-40 Q-10,-20 0,0Z" fill="#00ccff" class="drop-anim" />
  </g>
  
  <!-- Texto principal -->
  <text x="180" y="95" 
        font-family="Arial, sans-serif" 
        font-size="52" 
        font-weight="bold" 
        fill="url(#grad1)"
        filter="drop-shadow(0 0 10px rgba(0,102,255,0.3))">
    Rodrigo
  </text>
  
  <text x="490" y="95" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="300" 
        fill="#00ccff"
        opacity="0.7">
    _GX
  </text>
  
  <!-- Subtítulo -->
  <text x="220" y="130" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        fill="#00ccff"
        opacity="0.5"
        letter-spacing="4">
    FULL STACK DEVELOPER
  </text>
  
  <!-- Círculos de agua decorativos -->
  <circle cx="650" cy="100" r="20" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.3" class="pulse-anim" />
  <circle cx="650" cy="100" r="30" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.2" class="pulse-anim" />
  <circle cx="650" cy="100" r="40" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.1" class="pulse-anim" />
  
  <!-- Burbujas -->
  <circle cx="30" cy="30" r="3" fill="#00ccff" opacity="0.2">
    <animate attributeName="cy" values="30;10;30" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="750" cy="50" r="2" fill="#00ccff" opacity="0.2">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="170" r="4" fill="#00ccff" opacity="0.15">
    <animate attributeName="cy" values="170;150;170" dur="3.5s" repeatCount="indefinite" />
  </circle>
</svg>
