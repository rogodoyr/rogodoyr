<svg viewBox="0 0 800 20" xmlns="http://www.w3.org/2000/svg" style="background:transparent;width:100%;height:20px;">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="flash" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="intenseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="1" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Línea izquierda -->
  <line x1="0" y1="10" x2="0" y2="10" stroke="url(#grad)" stroke-width="1.5" filter="url(#glow)" opacity="0.8">
    <animate attributeName="x2" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Línea derecha -->
  <line x1="800" y1="10" x2="800" y2="10" stroke="url(#grad)" stroke-width="1.5" filter="url(#glow)" opacity="0.8">
    <animate attributeName="x2" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Estelas punto izquierdo -->
  <circle cx="0" cy="10" r="2" fill="#00d4ff" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.05s"/>
  </circle>
  <circle cx="0" cy="10" r="1.5" fill="#00d4ff" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.1s"/>
  </circle>
  <circle cx="0" cy="10" r="1" fill="#00d4ff" opacity="0.2" filter="url(#glow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.15s"/>
  </circle>

  <!-- Estelas punto derecho -->
  <circle cx="800" cy="10" r="2" fill="#7b2ff7" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.05s"/>
  </circle>
  <circle cx="800" cy="10" r="1.5" fill="#7b2ff7" opacity="0.4" filter="url(#glow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.1s"/>
  </circle>
  <circle cx="800" cy="10" r="1" fill="#7b2ff7" opacity="0.2" filter="url(#glow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.15s"/>
  </circle>

  <!-- Partículas punto izquierdo -->
  <circle cx="0" cy="8" r="1" fill="#00d4ff" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.1s"/>
    <animate attributeName="cy" values="8;7;6;8;8" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.2;0;0" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="12" r="0.8" fill="#00d4ff" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.2s"/>
    <animate attributeName="cy" values="12;13;14;12;12" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.1;0;0" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Partículas punto derecho -->
  <circle cx="800" cy="8" r="1" fill="#7b2ff7" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.1s"/>
    <animate attributeName="cy" values="8;7;6;8;8" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.2;0;0" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="12" r="0.8" fill="#7b2ff7" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1" begin="0.2s"/>
    <animate attributeName="cy" values="12;13;14;12;12" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.3;0.1;0;0" keyTimes="0;0.15;0.3;0.45;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Punto izquierdo principal -->
  <circle cx="0" cy="10" r="3" fill="#00d4ff" filter="url(#intenseGlow)">
    <animate attributeName="cx" values="0;400;400;0;0" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>

  <!-- Punto derecho principal -->
  <circle cx="800" cy="10" r="3" fill="#7b2ff7" filter="url(#intenseGlow)">
    <animate attributeName="cx" values="800;400;400;800;800" keyTimes="0;0.45;0.5;0.95;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  </circle>

  <!-- Colisión central intensa - Flash principal -->
  <circle cx="400" cy="10" r="0" fill="white" filter="url(#flash)">
    <animate attributeName="r" values="0;0;10;12;0" keyTimes="0;0.44;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0.8;0" keyTimes="0;0.44;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Ondas de choque en la colisión -->
  <circle cx="400" cy="10" r="0" fill="none" stroke="white" stroke-width="2" filter="url(#glow)">
    <animate attributeName="r" values="0;0;20;40" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="10" r="0" fill="none" stroke="white" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="r" values="0;0;15;30" keyTimes="0;0.47;0.49;0.51" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.8;0" keyTimes="0;0.47;0.49;0.51" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Partículas de la colisión -->
  <circle cx="400" cy="5" r="1.5" fill="white" filter="url(#intenseGlow)">
    <animate attributeName="cy" values="10;10;5;2" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="15" r="1.5" fill="white" filter="url(#intenseGlow)">
    <animate attributeName="cy" values="10;10;15;18" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="390" cy="10" r="1" fill="white" filter="url(#intenseGlow)">
    <animate attributeName="cx" values="400;400;390;375" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="410" cy="10" r="1" fill="white" filter="url(#intenseGlow)">
    <animate attributeName="cx" values="400;400;410;425" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.48;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Estrella de destello en la colisión -->
  <path d="M400,8 L401,9 L402,8 L401,10 L402,11 L401,10 L400,12 L399,10 L398,11 L399,10 L398,8 L399,9 Z" fill="white" filter="url(#flash)">
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.46;0.47;0.5" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1;1;2;1" keyTimes="0;0.46;0.47;0.5" dur="3s" repeatCount="indefinite" additive="sum"/>
  </path>
</svg>
